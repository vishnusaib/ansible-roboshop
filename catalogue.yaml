- name: configure catalogue component
  hosts: catalogue
  become: yes
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: Install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin/
      system: true
      home: /app

  - name: create app dir
    ansible.builtin.file: 
      path: /app
      state: directory

  - name: download catalogue code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
      dest: /tmp/catalogue.zip

# this thinks file is exist in ansible control server
# so we need to use remote_src: yes means files already exist in catalogue server  
  - name: Extract catalogue code
    ansible.builtin.unarchive:
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: Copy Service file
    ansible.builtin.copy:
      src: catalogue.service
      dest: /etc/systemd/system/catalogue.service

  - name: systemctl daemon reload
    ansible.builtin.systemd_serivce:
      daemon_reload: true
  
  - name: Start and enable catalogue service
    ansible.builtin.serivce:
      name: catalogue
      state: started
      enabled: yes
    
  - name: Install mondodb repo
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo
  
  - name: Install Mongodb client server
    ansible.builtin.dnf: 
      name: mongodb-mongosh
      state: present

  - name: check products loaded or not
    ansible.builtin.command: mongosh --host mongodb.vishnuv8.shop --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output

  - name: print catalogue_output
    ansible.builtin.debug:
      msg: "{{ catalogue_output}}"

  - name: load master data
    ansible.builtin.shell: mongosh --host mongodb.vishnuc8.shop > /app/db/master-data.js
    when: catalogue.output.stdout | int < 0
