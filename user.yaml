- name: configure user component
  hosts: user
  become: yes
  tasks:
  - name: disable default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enable nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y
  
  - name: Install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present
  
  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin/
      system: true
      home: /app

  - name: create app dir
    ansible.builtin.file: 
      path: /app
      state: directory

  - name: download user code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/user-v3.zip
      dest: /tmp/user.zip

# this thinks file is exist in ansible control server
# so we need to use remote_src: yes means files already exist in user server  
  - name: Extract user code
    ansible.builtin.unarchive:
      src: /tmp/user.zip
      dest: /app
      remote_src: yes

  - name: install dependencies
    community.general.npm:
      path: /app

  - name: Copy Service file
    ansible.builtin.copy:
      src: user.service
      dest: /etc/systemd/system/user.service

  - name: systemctl daemon reload
    ansible.builtin.systemd.serivce:
      daemon_reload: true
  
  - name: Start and enable user service
    ansible.builtin.serivce:
      name: user
      state: started
      enabled: yes
