- name: Setup Rabbitmq server
  hosts: rabbitmq
  become: yes
  tasks:
  - name: Copy Rabbitmq repo
    ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo

  - name: Install Rabbitmq server
    ansible.builtin.dnf:
      name: rabbitmq-server
      state: present
  
  - name: enable and start rabbitmq service
    ansible.builtin.service:
      name: rabbitmq-server
      state: started
      enabled: yes

  - name: User setup
    community.rabbitmq.rabbitmq_user:
      user: roboshop
      password: RoboShop@1
      permissions:
      - vhosts: /
        configure_priv: .*
        read_priv: .*
        write_priv: .*
      state: present